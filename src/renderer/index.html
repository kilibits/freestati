<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- CSP allows Tauri's IPC and asset protocols alongside the local bundle. -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: asset: http://asset.localhost; connect-src 'self' ipc: http://ipc.localhost" />
  <title>FreeStati</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">

    <!-- macOS traffic-light / drag region -->
    <div class="titlebar">
      <span class="titlebar-title">FreeStati</span>
    </div>

    <!-- Toolbar: only the read-only / edit-mode toggle (all other actions
         live in the menu bar). -->
    <div class="toolbar">
      <button id="btn-edit-toggle" class="toolbar-btn" title="Datasets open read-only; click to allow editing">🔒 Read-only</button>
    </div>

    <!-- Body: sidebar + main content -->
    <div id="layout" class="layout">

      <!-- Sidebar: File Explorer -->
      <div id="sidebar" class="sidebar"></div>

      <!-- Resize handle -->
      <div id="sidebar-resizer" class="sidebar-resizer"></div>

      <!-- Right panel: data grids + tab bar + status -->
      <div class="content-panel">

        <div class="main-content">
          <div id="pane-data"     class="view-pane" style="display:flex"></div>
          <div id="pane-variable" class="view-pane" style="display:none"></div>
          <div id="pane-output"   class="view-pane" style="display:none"></div>
          <div id="pane-syntax"   class="view-pane" style="display:none"></div>
        </div>

        <div class="tab-bar">
          <button class="tab-btn active" data-view="data">Data View</button>
          <button class="tab-btn"        data-view="variable">Variable View</button>
          <button class="tab-btn"        data-view="output">Output</button>
          <button class="tab-btn"        data-view="syntax">Syntax</button>
        </div>

        <div id="status-bar-host"></div>

      </div>
    </div>

    <!-- Loading overlay (shown during slow file operations) -->
    <div id="loading-overlay" class="loading-overlay hidden">
      <div class="loading-box">
        <div class="spinner"></div>
        <span id="loading-message">Loading…</span>
      </div>
    </div>

  </div>

  <script type="module" src="renderer.js"></script>
</body>
</html>
