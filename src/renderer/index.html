<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <title>FreeStati</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">

    <!-- macOS traffic-light / drag region -->
    <div class="titlebar">
      <span class="titlebar-title">FreeStati</span>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <button id="btn-explorer"    class="toolbar-btn active" title="Toggle File Explorer">⊞</button>
      <button id="btn-open-folder" class="toolbar-btn"        title="Open Folder in Explorer">📁</button>
      <div class="toolbar-sep"></div>
      <button id="btn-new"  class="toolbar-btn" title="New Dataset (Ctrl+N)">New</button>
      <button id="btn-open" class="toolbar-btn" title="Open File (Ctrl+O)">Open…</button>
      <button id="btn-save" class="toolbar-btn" title="Save (Ctrl+S)">Save</button>
    </div>

    <!-- Body: sidebar + main content -->
    <div id="layout" class="layout">

      <!-- Sidebar: File Explorer -->
      <div id="sidebar" class="sidebar"></div>

      <!-- Resize handle -->
      <div id="sidebar-resizer" class="sidebar-resizer"></div>

      <!-- Right panel: data grids + tab bar + status -->
      <div class="content-panel">

        <div class="main-content">
          <div id="pane-data"     class="view-pane" style="display:flex"></div>
          <div id="pane-variable" class="view-pane" style="display:none"></div>
        </div>

        <div class="tab-bar">
          <button class="tab-btn active" data-view="data">Data View</button>
          <button class="tab-btn"        data-view="variable">Variable View</button>
        </div>

        <div id="status-bar-host"></div>

      </div>
    </div>

  </div>

  <script type="module" src="renderer.js"></script>
</body>
</html>
